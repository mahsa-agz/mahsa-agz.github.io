<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1419" media="(prefers-color-scheme: dark)" />

    {%- seo -%}

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Mahsa Aghazadeh",
        "url": "{{ site.url }}/",
        "email": "mailto:{{ site.email }}",
        "jobTitle": "Data Scientist",
        "alumniOf": [
          { "@type": "CollegeOrUniversity", "name": "KAIST" },
          { "@type": "CollegeOrUniversity", "name": "Amirkabir University of Technology" }
        ],
        "sameAs": [
          "https://github.com/{{ site.github_username }}",
          "{{ site.linkedin_url }}"
        ]
      }
    </script>

    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark" || t === "light") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>

    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Oswald:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- home.css first (homepage body sections), then main.css overrides nav/footer/tokens for editorial consistency -->
    <link rel="stylesheet" href="{{ '/styles/home.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/styles/main.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/styles/post.css' | relative_url }}" />
  </head>
  <body>
    {% include site-nav.html %}

    <main>
      {{ content }}
    </main>

    {% include site-footer.html %}

    <script src="{{ '/scripts/main.js' | relative_url }}"></script>
  </body>
</html>
